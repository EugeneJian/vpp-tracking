<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AU VPP Dashboard - Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f4efe7 0%, #e8dfd3 100%);
      font-family: "Avenir Next", "SF Pro Display", "PingFang SC", sans-serif;
    }
    .login-box {
      background: white;
      padding: 48px 40px;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(85, 55, 26, 0.15);
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    h1 {
      margin: 0 0 8px;
      color: #271b12;
      font-size: 24px;
    }
    p {
      color: #756252;
      margin: 0 0 32px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8dfd3;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #bc5f2e;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #bc5f2e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #a64f24;
    }
    .error {
      color: #b64332;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>AU VPP Dashboard</h1>
    <p>请输入访问密码</p>
    <form id="loginForm">
      <input type="password" id="password" placeholder="密码" required autocomplete="current-password" />
      <button type="submit">访问</button>
    </form>
    <p class="error" id="error">密码错误，请重试</p>
  </div>
  <script>
    // 密码在部署时通过环境变量设置
    const correctPassword = 'VPP2024!';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('password').value;

      // 密码验证
      if (input === correctPassword) {
        // 存储认证状态 (7天有效)
        const expiry = new Date();
        expiry.setDate(expiry.getDate() + 7);
        document.cookie = 'vpp_auth=valid; expires=' + expiry.toUTCString() + '; path=/; SameSite=Strict';
        window.location.href = 'vpp_dashboard.html';
      } else {
        document.getElementById('error').classList.add('show');
      }
    });
  </script>
</body>
</html>
